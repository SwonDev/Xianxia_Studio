<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1080px;
        height: 1920px;
        background: #0a0a0f;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
      }
      video {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
      }
      .hook {
        position: absolute;
        top: 120px;
        left: 40px;
        right: 40px;
        font-size: 64px;
        font-weight: 800;
        line-height: 1.1;
        color: #e8c96d;
        text-align: center;
        text-shadow: 0 6px 20px rgba(0,0,0,0.95);
        letter-spacing: -0.02em;
      }
      .footer {
        position: absolute;
        bottom: 80px;
        left: 0;
        right: 0;
        text-align: center;
        font-size: 28px;
        color: #e8e8f0;
        text-shadow: 0 4px 12px rgba(0,0,0,0.95);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="short"
      data-start="0"
      data-duration="__DURATION__"
      data-width="1080"
      data-height="1920"
    >
      <video
        id="short-clip"
        class="clip"
        data-track-index="0"
        data-start="0"
        data-duration="__DURATION__"
        src="__CLIP__"
        autoplay
        muted
      ></video>
      <div class="hook" id="short-hook">__HOOK__</div>
      <div class="footer" id="short-footer">▶ Watch the full story</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      var tl = gsap.timeline({ paused: true });
      // Subtle hook entrance animation so the title isn't a static popup.
      tl.fromTo('#short-hook',
        { opacity: 0, y: -30 },
        { opacity: 1, y: 0, duration: 0.6, ease: 'power2.out' },
        0.1
      );
      window.__timelines['short'] = tl;
    </script>
  </body>
</html>
