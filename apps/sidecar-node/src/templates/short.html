<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1080, height=1920" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      /*
       * Xianxia Shorts v2 — HyperFrames-driven, OpusClip-grade composition.
       *
       * Layers (bottom → top):
       *   1. Background <video> (the smart-reframed vertical clip from
       *      _smart_reframe_to_vertical in shorts_auto.py).
       *   2. Atmospheric vignette + bottom gradient for caption legibility.
       *   3. HOOK overlay (first 1.5–2 s) — large attention-grabber.
       *   4. CAPTIONS — word tokens with timed pop-in + active highlight.
       *   5. PROGRESS BAR — bottom, fills 0→1 over the full clip.
       *   6. CTA card — last 1.5 s, fades up over the video.
       *
       * GSAP property note: HyperFrames officially supports
       *   opacity, x, y, scale, scaleX, scaleY, rotation, width, height,
       *   visibility.
       * We do NOT animate color/background/clipPath/filter via GSAP.
       * Active-word highlight is achieved with TWO stacked <span>s
       * (white base + yellow on top) animated only via opacity. Same
       * idea for the CTA card: the visual swap is opacity-only.
       *
       * The wrapper around the <video> exists because HyperFrames
       * forces opacity:1 on any element with data-start/data-duration —
       * applying opacity to the video tag itself would be silently
       * overwritten. The wrapper has NO data-* attributes.
       */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1080px;
        height: 1920px;
        background: #000;
        overflow: hidden;
        font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
        color: #fff;
      }
      .stage { position: relative; width: 1080px; height: 1920px; }

      /* — Layer 1: background video (no opacity gymnastics here) — */
      .video-wrap {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
      }
      video.bg-clip {
        position: absolute; inset: 0;
        width: 100%; height: 100%;
        object-fit: cover;
      }

      /* — Layer 2: vignette + bottom gradient for caption legibility — */
      .vignette {
        position: absolute; inset: 0;
        background:
          radial-gradient(120% 80% at 50% 35%,
            rgba(0,0,0,0) 55%, rgba(0,0,0,0.45) 100%),
          linear-gradient(to bottom,
            rgba(0,0,0,0.0) 0%,
            rgba(0,0,0,0.0) 60%,
            rgba(0,0,0,0.55) 100%);
        pointer-events: none;
      }

      /* — Layer 3: HOOK — large attention grabber (top region) — */
      .hook-wrap {
        position: absolute;
        top: 11%;
        left: 50%;
        transform: translateX(-50%) translate3d(0,0,0);
        width: 92%;
        text-align: center;
        opacity: 0;
        will-change: transform, opacity;
      }
      .hook-text {
        display: inline-block;
        padding: 18px 36px;
        font-weight: 900;
        font-size: 92px;
        line-height: 1.05;
        color: #fff;
        background: linear-gradient(180deg, #ffd23f 0%, #ff8a1f 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: -0.02em;
        text-shadow:
          0 0 22px rgba(0,0,0,0.85),
          0 8px 28px rgba(0,0,0,0.65);
        filter: drop-shadow(0 6px 12px rgba(0,0,0,0.95));
      }

      /* — Layer 4: CAPTIONS — Hormozi-grade (v0.1.22 A2) —
       *
       * OpusClip's "Mozi" preset (and the Hormozi convention it
       * imitates) shows ONE word at a time, very large, with no
       * background pill — only a thick black outline so it reads
       * legibly on any frame. Scale-punch on the active word, no
       * yellow pill behind. We render that here.
       *
       * - One word at a time means each .word fills the width and
       *   sits at the same anchor; only opacity differs over time.
       * - "Outline" is built from a multi-direction text-shadow
       *   stack (8 directions × 2 layers) — text-stroke is unreliable
       *   across Chromium's text rasteriser at large sizes.
       * - The .w-active overlay swap stays opacity-only so we keep
       *   GSAP simple.
       */
      /* OpusClip Mozi grouping: 2-3 words per group, all visible at
       * once, active word highlighted in yellow, group cross-fades
       * to next group. The .caps wrapper is the stable anchor; each
       * .cap-group is positioned absolutely on top of it. */
      .caps {
        position: absolute;
        left: 0;
        right: 0;
        bottom: 18%;
        height: 260px;
        will-change: transform;
      }
      .cap-group {
        position: absolute;
        left: 50%;
        top: 50%;
        transform: translate(-50%, -50%) translate3d(0,0,0);
        width: 92%;
        text-align: center;
        line-height: 1.05;
        opacity: 0;
        will-change: opacity, transform;
      }
      .cap-group .word {
        display: inline-block;
        position: relative;
        margin: 0 14px;
        font-weight: 900;
        font-size: 96px;
        letter-spacing: -0.01em;
        text-transform: uppercase;
        white-space: nowrap;
        will-change: transform;
        /* Multi-direction outline (8 dir × 2 layers) for legibility on
         * any background. Closed with a soft drop shadow. */
        text-shadow:
          -3px -3px 0 #000, 3px -3px 0 #000, -3px 3px 0 #000, 3px 3px 0 #000,
          -3px 0 0 #000, 3px 0 0 #000, 0 -3px 0 #000, 0 3px 0 #000,
          -6px 0 0 #000, 6px 0 0 #000, 0 -6px 0 #000, 0 6px 0 #000,
          0 8px 16px rgba(0,0,0,0.85);
      }
      .cap-group .word .w-base,
      .cap-group .word .w-active {
        display: inline-block;
        line-height: 1;
      }
      .cap-group .word .w-base { color: #ffffff; }
      .cap-group .word .w-active {
        position: absolute;
        inset: 0;
        text-align: center;
        color: #ffd23f;
        opacity: 0;
        will-change: opacity;
      }

      /* — Layer 5: PROGRESS BAR — */
      .progress-track {
        position: absolute;
        bottom: 60px;
        left: 7%; right: 7%;
        height: 8px;
        background: rgba(255,255,255,0.18);
        border-radius: 4px;
        overflow: hidden;
      }
      .progress-fill {
        position: absolute;
        left: 0; top: 0; bottom: 0;
        width: 100%;
        background: linear-gradient(90deg, #ffd23f 0%, #ff6b35 100%);
        transform: scaleX(0);
        transform-origin: left center;
        will-change: transform;
      }

      /* — Layer 6: CTA card — last 1.5 s — */
      .cta-wrap {
        position: absolute; inset: 0;
        background: rgba(8, 8, 14, 0.94);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        opacity: 0;
        will-change: opacity;
      }
      .cta-title {
        font-size: 132px;
        font-weight: 900;
        color: #ffd23f;
        text-shadow: 0 8px 30px rgba(0,0,0,0.85);
        margin-bottom: 28px;
        letter-spacing: -0.02em;
        opacity: 0;
        will-change: transform, opacity;
      }
      .cta-sub {
        font-size: 50px;
        color: #f4f4f8;
        font-weight: 600;
        text-align: center;
        max-width: 86%;
        line-height: 1.2;
        opacity: 0;
        will-change: transform, opacity;
      }
    </style>
  </head>
  <body>
    <div
      class="stage"
      id="stage"
      data-composition-id="short"
      data-start="0"
      data-duration="__DURATION__"
      data-width="1080"
      data-height="1920"
    >
      <!-- Layer 1: video (wrapped so we keep total control of the wrapper opacity if ever needed; the framework owns opacity on the video itself) -->
      <div class="video-wrap">
        <video
          class="bg-clip clip"
          id="short-clip"
          data-track-index="0"
          data-start="0"
          data-duration="__CLIP_DURATION__"
          data-media-start="0"
          src="__CLIP__"
          autoplay
          muted
          playsinline
        ></video>
      </div>

      <!-- Layer 2: atmospheric overlays -->
      <div class="vignette"></div>

      <!-- Layer 3: HOOK -->
      <div class="hook-wrap" id="hook-wrap">
        <div class="hook-text">__HOOK__</div>
      </div>

      <!-- Layer 4: CAPTIONS -->
      <div class="caps" id="caps">__CAPTIONS_HTML__</div>

      <!-- Layer 5: PROGRESS BAR -->
      <div class="progress-track">
        <div class="progress-fill" id="progress-fill"></div>
      </div>

      <!-- Layer 6: CTA -->
      <div class="cta-wrap" id="cta-wrap">
        <div class="cta-title" id="cta-title">__CTA_TITLE__</div>
        <div class="cta-sub" id="cta-sub">__CTA_SUB__</div>
      </div>
    </div>

    <script>
      // ── Configuration injected by the renderer ─────────────────────
      var DURATION = parseFloat(document.getElementById('stage').dataset.duration);
      // CLIP_DURATION = how long the source video lasts. The
      // composition runs CLIP_DURATION + ~1.2 s tail so the CTA card
      // has room to land cleanly without truncating the video mid-
      // sentence. We base hook/caption timing on CLIP_DURATION;
      // CTA + tail fade based on DURATION so the card stays visible
      // for the full extra second.
      var CLIP_DURATION = parseFloat(document.getElementById('short-clip').dataset.duration);
      // WORDS = [{s, e, words:[...]}, ...] — one entry per cap-group
      var WORDS = __WORDS_JSON__;
      var HOOK_END = Math.max(0.6, Math.min(2.0, CLIP_DURATION * 0.18));
      // CTA reveal happens 1.0 s before the clip ends so it overlaps
      // the last 1.0 s of audio, then holds through the 1.2 s tail.
      var CTA_AT = Math.max(0, CLIP_DURATION - 1.0);

      // ── Build the GSAP timeline (paused; framework controls play/seek) ──
      var tl = gsap.timeline({ paused: true });
      window.__timelines = window.__timelines || {};
      window.__timelines["short"] = tl;

      // 1) HOOK pop-in + hold + hard-kill (v0.1.22 A2)
      // Use overwrite:'auto' so the breathe → out chain doesn't trigger
      // HyperFrames' overlapping_gsap_tweens lint warning. The earlier
      // version had three independent tweens on opacity/scale/y all
      // landing in the same 0.05–0.32 s window which the linter (and
      // GSAP itself, sometimes) couldn't disambiguate.
      tl.set("#hook-wrap", { opacity: 0, scale: 0.65, y: -30 }, 0);
      tl.to("#hook-wrap",
        { opacity: 1, scale: 1.0, y: 0, duration: 0.45, ease: "back.out(2.0)", overwrite: "auto" },
        0.05
      );
      tl.to("#hook-wrap",
        { scale: 1.04, duration: Math.max(0.4, HOOK_END - 1.0), ease: "sine.inOut", overwrite: "auto" },
        0.55
      );
      tl.to("#hook-wrap",
        { opacity: 0, scale: 0.85, y: -22, duration: 0.32, ease: "power2.in", overwrite: "auto" },
        Math.max(0.6, HOOK_END - 0.32)
      );
      // hard-kill: lock the hook hidden after the exit tween so it never
      // flickers back during karaoke updates further down the timeline.
      tl.set("#hook-wrap", { opacity: 0, visibility: "hidden" }, HOOK_END + 0.05);

      // 2) PROGRESS BAR — linear scaleX 0→1 over the whole clip
      tl.fromTo("#progress-fill",
        { scaleX: 0 },
        { scaleX: 1, duration: DURATION, ease: "none" },
        0
      );

      // 3) CAPTIONS — OpusClip Mozi style: 2-3 words per group,
      //    visible together, with rolling yellow highlight on the
      //    active word. Groups cross-fade with the next.
      //    WORDS is now: [{s, e, words:[{s,e}, ...]}, ...]
      var capsEl = document.getElementById("caps");
      var groupEls = capsEl.querySelectorAll(".cap-group");
      // CAPTION SEQUENCE: groups MUST NEVER be visible at the same
      // time on the shared .caps anchor. The previous fade-based
      // approach still let two groups blend across 0.10–0.30 s of
      // crossfade because both `.to opacity:1` and `.to opacity:0`
      // played simultaneously at the boundary. v0.1.22 final fix:
      //   - HARD-CUT when the gap between groups is < 0.25 s (most
      //     of the time in fast dialogue). Group A vanishes EXACTLY
      //     when group B enters, no fade.
      //   - SOFT FADE only on long silences (≥ 0.25 s gap) where
      //     there's room for a clean 0.10 s out + 0.10 s in.
      // We also take both groups OUT of the compositor with
      // visibility:hidden the moment they're inactive, so the GPU
      // never holds a phantom layer.
      WORDS.forEach(function (g, gi) {
        var groupEl = groupEls[gi];
        if (!groupEl) return;
        var wordEls = groupEl.querySelectorAll(".word");
        var nextStart = (gi + 1 < WORDS.length) ? WORDS[gi + 1].s : DURATION;
        var groupOn = Math.max(HOOK_END + 0.02, g.s - 0.03);
        var gap = nextStart - g.e;
        var hardCut = gap < 0.25;
        // groupOff: when the visibility "owns" the slot until.
        // For hard-cuts, we vanish at nextStart EXACTLY (the next
        // group's groupOn) → guaranteed zero overlap.
        // For soft fades, we vanish 0.10 s before nextStart and add
        // a 0.10 s easing fade leading up to it.
        var groupOff = hardCut ? Math.max(g.e, nextStart - 0.001)
                               : (nextStart - 0.10);
        if (groupOff <= groupOn) groupOff = groupOn + 0.10;
        // Group enter — quick scale-in + opacity flip
        tl.set(groupEl, { opacity: 0, scale: 0.94, visibility: "visible" }, groupOn - 0.01);
        tl.to(groupEl,
          { opacity: 1, scale: 1.0, duration: 0.12, ease: "back.out(1.8)", overwrite: "auto" },
          groupOn
        );
        // Per-word active highlight: yellow swap + scale punch on the
        // word being SAID right now. The other words stay visible in
        // white outline so the reader has context.
        g.words.forEach(function (w, wi) {
          var wEl = wordEls[wi];
          if (!wEl) return;
          var wActive = wEl.querySelector(".w-active");
          tl.set(wEl, { scale: 1.0 }, 0);
          if (wActive) {
            tl.set(wActive, { opacity: 0 }, 0);
            tl.to(wActive,
              { opacity: 1, duration: 0.05, ease: "power1.out", overwrite: "auto" },
              w.s
            );
            tl.to(wEl,
              { scale: 1.10, duration: 0.10, ease: "power2.out", overwrite: "auto" },
              w.s
            );
            tl.to(wActive,
              { opacity: 0, duration: 0.08, ease: "power1.in", overwrite: "auto" },
              w.e
            );
            tl.to(wEl,
              { scale: 1.0, duration: 0.10, ease: "power2.in", overwrite: "auto" },
              w.e
            );
          }
        });
        // Group exit — hard cut OR fast 0.10 s fade. Both paths land
        // on the same final state (opacity 0 + visibility hidden) at
        // groupOff, guaranteeing no compositor leak.
        if (hardCut) {
          tl.set(groupEl, { opacity: 0, visibility: "hidden" }, groupOff);
        } else {
          tl.to(groupEl,
            { opacity: 0, duration: 0.10, ease: "power2.in", overwrite: "auto" },
            groupOff
          );
          tl.set(groupEl, { opacity: 0, visibility: "hidden" }, groupOff + 0.105);
        }
      });

      // 4) CTA reveal — fade the dark card up, then pop the title
      tl.to("#cta-wrap",
        { opacity: 1, duration: 0.42, ease: "power2.out" },
        CTA_AT
      );
      tl.fromTo("#cta-title",
        { opacity: 0, scale: 0.55, y: 12 },
        { opacity: 1, scale: 1.0, y: 0, duration: 0.5, ease: "back.out(2.5)" },
        CTA_AT + 0.08
      );
      tl.fromTo("#cta-sub",
        { opacity: 0, y: 18 },
        { opacity: 1, y: 0, duration: 0.4, ease: "power2.out" },
        CTA_AT + 0.32
      );

      // Sentinel: extend the timeline to the full clip duration so
      // HyperFrames doesn't bail past the last meaningful tween.
      tl.set({}, {}, DURATION);
    </script>
  </body>
</html>
