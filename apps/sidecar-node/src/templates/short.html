<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 1080px; height: 1920px; background: #0a0a0f; overflow: hidden; font-family: 'Plus Jakarta Sans', system-ui, sans-serif; }
    video { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; }
    .hook {
      position: absolute; top: 120px; left: 40px; right: 40px;
      font-size: 64px; font-weight: 800; line-height: 1.1;
      color: #e8c96d;
      text-align: center;
      text-shadow: 0 6px 20px rgba(0,0,0,0.95);
      letter-spacing: -0.02em;
    }
    .footer {
      position: absolute; bottom: 80px; left: 0; right: 0;
      text-align: center;
      font-size: 28px; color: #e8e8f0;
      text-shadow: 0 4px 12px rgba(0,0,0,0.95);
    }
  </style>
</head>
<body>
  <video src="__CLIP__" autoplay muted></video>
  <div class="hook">__HOOK__</div>
  <div class="footer">▶ Watch the full story</div>
</body>
</html>
