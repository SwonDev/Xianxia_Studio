<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1280, height=720" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        width: 1280px;
        height: 720px;
        background: #0a0a0f;
        overflow: hidden;
      }
      .bg { position: absolute; inset: 0; }
      .bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.85); }
      .overlay {
        position: absolute; inset: 0;
        background: linear-gradient(180deg, transparent 30%, rgba(10,10,15,0.85) 100%);
      }
      .title-en {
        position: absolute; left: 60px; bottom: 130px; right: 60px;
        font-family: 'EB Garamond', Georgia, serif;
        font-size: 96px; font-weight: 700; line-height: 1.05;
        color: #e8c96d;
        text-shadow: 0 8px 32px rgba(0,0,0,0.85), 0 0 24px rgba(201,168,76,0.4);
        letter-spacing: -0.02em;
      }
      .title-zh {
        position: absolute; left: 60px; bottom: 60px; right: 60px;
        font-family: 'Noto Serif SC', serif;
        font-size: 56px; font-weight: 700;
        color: #52b788;
        text-shadow: 0 4px 16px rgba(0,0,0,0.85);
      }
      .seal {
        position: absolute; top: 40px; right: 40px;
        width: 88px; height: 88px; border-radius: 50%;
        background: radial-gradient(circle, #c9a84c 0%, #a88a3c 100%);
        display: flex; align-items: center; justify-content: center;
        font-family: 'Noto Serif SC', serif; font-weight: 700;
        font-size: 48px; color: #0a0a0f;
        box-shadow: 0 0 32px rgba(201,168,76,0.6);
      }
    </style>
  </head>
  <body>
    <div
      id="root"
      data-composition-id="thumbnail"
      data-start="0"
      data-duration="1"
      data-width="1280"
      data-height="720"
    >
      <div class="bg" id="thumb-bg"><img src="__BG__" alt="" /></div>
      <div class="overlay" id="thumb-overlay"></div>
      <div class="seal" id="thumb-seal">仙</div>
      <div class="title-en" id="thumb-title-en">__TITLE_EN__</div>
      <div class="title-zh" id="thumb-title-zh">__TITLE_ZH__</div>
    </div>

    <script>
      window.__timelines = window.__timelines || {};
      // Still composition: a paused 1-second timeline is enough to satisfy
      // HyperFrames' lint requirement that every composition registers a
      // timeline. Render with `--still` to capture a single frame.
      var tl = gsap.timeline({ paused: true });
      window.__timelines['thumbnail'] = tl;
    </script>
  </body>
</html>
